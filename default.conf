server {
    listen 80;
    server_name localhost;
    
    # Define where the web files live inside the container
    root /usr/share/nginx/html;
    index index.html;

    # --- SECURITY HEADERS ---
    # Prevents your site from being framed by other sites (Clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN";
    
    # Prevents browsers from guessing the MIME type (MIME sniffing protection)
    add_header X-Content-Type-Options "nosniff";
    
    # Enables cross-site scripting (XSS) filter built into modern browsers
    add_header X-XSS-Protection "1; mode=block";
    
    # Restricts where resources (like scripts and images) can be loaded from
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline';";
    
    # Controls how much referrer information is included with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Standard routing rule
    location / {
        try_files $uri $uri/ =404;
    }
}